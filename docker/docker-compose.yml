version: '3'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.node
    container_name: node-app
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app
