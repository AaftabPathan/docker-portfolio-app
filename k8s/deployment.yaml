apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: portfolio-app

  template:
    metadata:
      labels:
        app: portfolio-app

    spec:
      containers:
        - name: portfolio-app
          image: aaftabpathan/docker-portfolio-app:latest

          ports:
            - containerPort: 80

          resources:
            requests:
              memory: "64Mi"
              cpu: "250m"
            limits:
              memory: "128Mi"
              cpu: "500m"

          env:
            - name: ENV
              valueFrom:
                configMapKeyRef:
                  name: portfolio-config
                  key: ENV

            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: portfolio-secret
                  key: PASSWORD

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 11
